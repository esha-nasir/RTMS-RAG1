<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">Figure 3.3 Comparative Pipeline of Evaluated Systems</title>
  <desc id="desc">Comparative diagram showing five systems from without_rag to ReflexionTemporalMemorySuccessAgentRAG and their shared evaluation stage.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f2ea"/>
      <stop offset="100%" stop-color="#e5efe9"/>
    </linearGradient>
    <linearGradient id="head3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#12373c"/>
      <stop offset="100%" stop-color="#2a5960"/>
    </linearGradient>
    <linearGradient id="rowA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#eef5f1"/>
    </linearGradient>
    <linearGradient id="rowB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7f1f5"/>
      <stop offset="100%" stop-color="#ddede7"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#15393d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#32565c"/>
    </marker>
    <style>
      .title { font: 700 36px Georgia, 'Times New Roman', serif; fill: #f8fbfb; }
      .subtitle { font: 400 18px Georgia, 'Times New Roman', serif; fill: #d7e8e8; }
      .box-title { font: 700 20px Georgia, 'Times New Roman', serif; fill: #183f44; }
      .box-body { font: 400 16px Georgia, 'Times New Roman', serif; fill: #294d52; }
      .small { font: 400 14px Georgia, 'Times New Roman', serif; fill: #42656a; }
      .line { stroke: #32565c; stroke-width: 3.2; fill: none; marker-end: url(#arrow3); }
    </style>
  </defs>
  <rect width="1800" height="980" fill="url(#bg3)"/>
  <rect x="40" y="32" width="1720" height="90" rx="24" fill="url(#head3)" filter="url(#shadow3)"/>
  <text x="70" y="86" class="title">Figure 3.3 Comparative Pipeline of the Evaluated Systems</text>
  <text x="70" y="112" class="subtitle">Five architectures tested under the same benchmark and judgment procedure</text>

  <rect x="70" y="180" width="300" height="90" rx="22" fill="url(#rowA)" stroke="#7c979a" stroke-width="2" filter="url(#shadow3)"/>
  <text x="145" y="232" class="box-title">Common Input Question</text>

  <rect x="110" y="330" width="260" height="95" rx="22" fill="url(#rowA)" stroke="#7c979a" stroke-width="2" filter="url(#shadow3)"/>
  <text x="172" y="382" class="box-title">without_rag</text>
  <text x="150" y="408" class="small">No retrieval, no external evidence</text>

  <rect x="430" y="330" width="260" height="95" rx="22" fill="url(#rowB)" stroke="#7c979a" stroke-width="2" filter="url(#shadow3)"/>
  <text x="505" y="382" class="box-title">VanillaRAG</text>
  <text x="470" y="408" class="small">Retrieve and generate once</text>

  <rect x="750" y="330" width="260" height="95" rx="22" fill="url(#rowA)" stroke="#7c979a" stroke-width="2" filter="url(#shadow3)"/>
  <text x="798" y="382" class="box-title">selfRefineAgentRAG</text>
  <text x="797" y="408" class="small">Retrieve, answer, then refine</text>

  <rect x="1070" y="330" width="260" height="95" rx="22" fill="url(#rowB)" stroke="#7c979a" stroke-width="2" filter="url(#shadow3)"/>
  <text x="1130" y="382" class="box-title">reflexionAgentRAG</text>
  <text x="1101" y="408" class="small">Reflective loop with verbal memory</text>

  <rect x="1390" y="330" width="300" height="95" rx="22" fill="url(#rowA)" stroke="#7c979a" stroke-width="2" filter="url(#shadow3)"/>
  <text x="1422" y="382" class="box-title">ReflexionTemporalMemorySuccessAgentRAG</text>
  <text x="1466" y="408" class="small">Reflective loop with temporal Bayesian memory</text>

  <rect x="110" y="500" width="260" height="120" rx="22" fill="url(#rowA)" stroke="#7c979a" stroke-width="2" filter="url(#shadow3)"/>
  <text x="171" y="550" class="box-title">Knowledge-only answer</text>
  <text x="168" y="578" class="box-body">No retrieval support</text>

  <rect x="430" y="500" width="260" height="120" rx="22" fill="url(#rowB)" stroke="#7c979a" stroke-width="2" filter="url(#shadow3)"/>
  <text x="496" y="550" class="box-title">Retrieve and answer</text>
  <text x="486" y="578" class="box-body">Single-pass baseline</text>

  <rect x="750" y="500" width="260" height="120" rx="22" fill="url(#rowA)" stroke="#7c979a" stroke-width="2" filter="url(#shadow3)"/>
  <text x="790" y="550" class="box-title">Retrieve, critique, revise</text>
  <text x="819" y="578" class="box-body">Refinement stage added</text>

  <rect x="1070" y="500" width="260" height="120" rx="22" fill="url(#rowB)" stroke="#7c979a" stroke-width="2" filter="url(#shadow3)"/>
  <text x="1124" y="550" class="box-title">Retrieve, reflect, retry</text>
  <text x="1094" y="578" class="box-body">Simple verbal episodic memory</text>

  <rect x="1390" y="500" width="300" height="120" rx="22" fill="url(#rowA)" stroke="#7c979a" stroke-width="2" filter="url(#shadow3)"/>
  <text x="1440" y="550" class="box-title">Retrieve, reflect, retry, score memory</text>
  <text x="1440" y="578" class="box-body">Temporal recency + reliability + risk control</text>

  <rect x="610" y="745" width="580" height="120" rx="24" fill="#fff8ef" stroke="#8ea8a8" stroke-width="2" filter="url(#shadow3)"/>
  <text x="780" y="795" class="box-title">Common Evaluation Framework</text>
  <text x="674" y="825" class="box-body">Same benchmark rows, same judge, same lexical metrics, and same comparative summary outputs</text>

  <path class="line" d="M220 270 L220 330"/>
  <path class="line" d="M220 425 L220 500"/>
  <path class="line" d="M560 270 L560 330"/>
  <path class="line" d="M560 425 L560 500"/>
  <path class="line" d="M880 270 L880 330"/>
  <path class="line" d="M880 425 L880 500"/>
  <path class="line" d="M1200 270 L1200 330"/>
  <path class="line" d="M1200 425 L1200 500"/>
  <path class="line" d="M1540 270 L1540 330"/>
  <path class="line" d="M1540 425 L1540 500"/>
  <path class="line" d="M220 620 L610 745"/>
  <path class="line" d="M560 620 L720 745"/>
  <path class="line" d="M880 620 L900 745"/>
  <path class="line" d="M1200 620 L1080 745"/>
  <path class="line" d="M1540 620 L1190 745"/>

  <rect x="70" y="890" width="1660" height="55" rx="18" fill="#fffaf1" stroke="#8ea8a8" stroke-width="2"/>
  <text x="110" y="925" class="box-body">Interpretation: the five systems differ mainly in retrieval support, refinement, reflection, and memory design, but they are judged under the same experimental setting.</text>
</svg>
