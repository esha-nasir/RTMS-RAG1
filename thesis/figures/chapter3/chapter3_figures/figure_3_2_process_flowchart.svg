<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1700" viewBox="0 0 1200 1700" role="img" aria-labelledby="title desc">
  <title id="title">Figure 3.2 Process Flowchart of the Proposed System</title>
  <desc id="desc">Flowchart showing question input, retrieval, memory scoring, answer generation, critic check, reflection retry loop, and memory update.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f1e8"/>
      <stop offset="100%" stop-color="#e5efe9"/>
    </linearGradient>
    <linearGradient id="head2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14383d"/>
      <stop offset="100%" stop-color="#2b5960"/>
    </linearGradient>
    <linearGradient id="proc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#edf5f1"/>
    </linearGradient>
    <linearGradient id="alt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f1f5"/>
      <stop offset="100%" stop-color="#dff0e8"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#15393d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#32565c"/>
    </marker>
    <style>
      .title { font: 700 34px Georgia, 'Times New Roman', serif; fill: #f8fbfb; }
      .subtitle { font: 400 17px Georgia, 'Times New Roman', serif; fill: #d7e8e8; }
      .box-title { font: 700 18px Georgia, 'Times New Roman', serif; fill: #183f44; }
      .box-body { font: 400 15px Georgia, 'Times New Roman', serif; fill: #294d52; }
      .small { font: 400 14px Georgia, 'Times New Roman', serif; fill: #42656a; }
      .line { stroke: #32565c; stroke-width: 3.2; fill: none; marker-end: url(#arrow2); }
      .dash { stroke-dasharray: 10 8; }
    </style>
  </defs>
  <rect width="1200" height="1700" fill="url(#bg2)"/>
  <rect x="40" y="32" width="1120" height="88" rx="24" fill="url(#head2)" filter="url(#shadow2)"/>
  <text x="70" y="84" class="title">Figure 3.2 Process Flowchart of ReflexionTemporalMemorySuccessAgentRAG</text>
  <text x="70" y="110" class="subtitle">Execution order from question input to final answer and episodic memory update</text>

  <ellipse cx="600" cy="180" rx="180" ry="52" fill="url(#proc)" stroke="#7c979a" stroke-width="2" filter="url(#shadow2)"/>
  <text x="542" y="187" class="box-title">Start</text>

  <rect x="380" y="270" width="440" height="90" rx="22" fill="url(#proc)" stroke="#7c979a" stroke-width="2" filter="url(#shadow2)"/>
  <text x="430" y="320" class="box-title">Receive legal question and task metadata</text>

  <rect x="380" y="410" width="440" height="95" rx="22" fill="url(#alt)" stroke="#7c979a" stroke-width="2" filter="url(#shadow2)"/>
  <text x="464" y="458" class="box-title">Retrieve top-k evidence chunks</text>
  <text x="470" y="484" class="small">semantic retrieval, lexical rerank, primary evidence selection</text>

  <rect x="380" y="555" width="440" height="95" rx="22" fill="url(#proc)" stroke="#7c979a" stroke-width="2" filter="url(#shadow2)"/>
  <text x="458" y="603" class="box-title">Retrieve candidate memories</text>
  <text x="430" y="629" class="small">same task, same file or case, and trusted prior episodes</text>

  <rect x="380" y="700" width="440" height="110" rx="22" fill="url(#alt)" stroke="#7c979a" stroke-width="2" filter="url(#shadow2)"/>
  <text x="470" y="748" class="box-title">Score candidate memories</text>
  <text x="443" y="776" class="box-body">Similarity + Recency + Reliability - Risk + Metadata Bonus</text>

  <rect x="380" y="860" width="440" height="95" rx="22" fill="url(#proc)" stroke="#7c979a" stroke-width="2" filter="url(#shadow2)"/>
  <text x="455" y="908" class="box-title">Generate answer from evidence and memory</text>
  <text x="458" y="934" class="small">grounded or extractive depending on task mode</text>

  <rect x="380" y="1005" width="440" height="95" rx="22" fill="url(#alt)" stroke="#7c979a" stroke-width="2" filter="url(#shadow2)"/>
  <text x="500" y="1053" class="box-title">Critic evaluates answer</text>
  <text x="424" y="1079" class="small">check support, sufficiency, hallucination risk, and abstention need</text>

  <polygon points="600,1160 800,1260 600,1360 400,1260" fill="#fff8ef" stroke="#7c979a" stroke-width="2" filter="url(#shadow2)"/>
  <text x="500" y="1266" class="box-title">Is the answer sufficiently grounded?</text>

  <rect x="380" y="1420" width="440" height="100" rx="22" fill="url(#proc)" stroke="#7c979a" stroke-width="2" filter="url(#shadow2)"/>
  <text x="450" y="1470" class="box-title">Return final answer and evidence trace</text>
  <text x="463" y="1496" class="small">accepted answer, cited chunks, and final reasoning state</text>

  <ellipse cx="600" cy="1610" rx="180" ry="52" fill="url(#proc)" stroke="#7c979a" stroke-width="2" filter="url(#shadow2)"/>
  <text x="548" y="1617" class="box-title">End</text>

  <rect x="850" y="1188" width="250" height="150" rx="22" fill="url(#alt)" stroke="#7c979a" stroke-width="2" filter="url(#shadow2)"/>
  <text x="900" y="1235" class="box-title">If answer is weak</text>
  <text x="880" y="1265" class="box-body">Generate retrieval reflection</text>
  <text x="880" y="1288" class="box-body">Generate answer reflection</text>
  <text x="880" y="1311" class="box-body">Retry with new guidance</text>

  <rect x="70" y="1450" width="250" height="110" rx="22" fill="url(#alt)" stroke="#7c979a" stroke-width="2" filter="url(#shadow2)"/>
  <text x="118" y="1498" class="box-title">Update episodic memory</text>
  <text x="110" y="1525" class="box-body">save episode, alpha, beta, risk</text>

  <path class="line" d="M600 232 L600 270"/>
  <path class="line" d="M600 360 L600 410"/>
  <path class="line" d="M600 505 L600 555"/>
  <path class="line" d="M600 650 L600 700"/>
  <path class="line" d="M600 810 L600 860"/>
  <path class="line" d="M600 955 L600 1005"/>
  <path class="line" d="M600 1100 L600 1160"/>
  <path class="line" d="M600 1360 L600 1420"/>
  <path class="line" d="M600 1520 L600 1558"/>
  <path class="line" d="M400 1260 L195 1260 L195 1450"/>
  <path class="line" d="M320 1505 L380 1505"/>
  <path class="line" d="M800 1260 L850 1260"/>
  <path class="line dash" d="M975 1338 L975 1388 L600 1388 L600 1360"/>
  <text x="822" y="1248" class="small">No</text>
  <text x="620" y="1408" class="small">Yes</text>
</svg>
