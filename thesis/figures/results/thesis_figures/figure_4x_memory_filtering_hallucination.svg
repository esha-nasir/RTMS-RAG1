<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">Effect of Memory Filtering on Hallucination Rate</title>
  <desc id="desc">Grouped bar chart comparing memory hit rate and hallucination rate with memory across strict, balanced, relaxed, and safe skeptic memory settings.</desc>
  <rect width="980" height="620" fill="#ffffff"/>
  <text x="490" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1f2933">Effect of Memory Filtering on Hallucination Rate</text>

  <!-- Plot area: left=105, top=85, width=760, height=390, scale max=0.70 -->
  <line x1="105" y1="475" x2="865" y2="475" stroke="#2b2b2b" stroke-width="2"/>
  <line x1="105" y1="85" x2="105" y2="475" stroke="#2b2b2b" stroke-width="2"/>

  <!-- Grid and y labels -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#333333">
    <line x1="105" y1="475.0" x2="865" y2="475.0" stroke="#d6d6d6" stroke-width="1"/>
    <text x="88" y="480" text-anchor="end">0.0</text>
    <line x1="105" y1="363.6" x2="865" y2="363.6" stroke="#d6d6d6" stroke-width="1" stroke-dasharray="5 5"/>
    <text x="88" y="368.6" text-anchor="end">0.2</text>
    <line x1="105" y1="252.1" x2="865" y2="252.1" stroke="#d6d6d6" stroke-width="1" stroke-dasharray="5 5"/>
    <text x="88" y="257.1" text-anchor="end">0.4</text>
    <line x1="105" y1="140.7" x2="865" y2="140.7" stroke="#d6d6d6" stroke-width="1" stroke-dasharray="5 5"/>
    <text x="88" y="145.7" text-anchor="end">0.6</text>
    <text x="55" y="286" text-anchor="middle" transform="rotate(-90 55 286)" font-size="17" font-weight="700">Rate</text>
  </g>

  <!-- Legend -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#222222">
    <rect x="625" y="77" width="18" height="18" fill="#2f6b9a"/>
    <text x="652" y="91">Memory hit rate</text>
    <rect x="625" y="104" width="18" height="18" fill="#c44e52"/>
    <text x="652" y="118">Hallucination rate with memory</text>
  </g>

  <!-- Bars. Scale y = 475 - value/0.70*390 -->
  <!-- Strict center=200 -->
  <rect x="156" y="452.7" width="38" height="22.3" fill="#2f6b9a"/>
  <rect x="206" y="419.3" width="38" height="55.7" fill="#c44e52"/>
  <text x="175" y="444" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#222222">0.04</text>
  <text x="225" y="411" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#222222">0.10</text>
  <text x="200" y="506" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#222222">Strict</text>

  <!-- Balanced center=390 -->
  <rect x="346" y="207.6" width="38" height="267.4" fill="#2f6b9a"/>
  <rect x="396" y="408.1" width="38" height="66.9" fill="#c44e52"/>
  <text x="365" y="199" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#222222">0.48</text>
  <text x="415" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#222222">0.12</text>
  <text x="390" y="506" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#222222">Balanced</text>

  <!-- Relaxed center=580 -->
  <rect x="536" y="151.9" width="38" height="323.1" fill="#2f6b9a"/>
  <rect x="586" y="385.9" width="38" height="89.1" fill="#c44e52"/>
  <text x="555" y="143" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#222222">0.58</text>
  <text x="605" y="377" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#222222">0.16</text>
  <text x="580" y="506" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#222222">Relaxed</text>

  <!-- Safe skeptic center=770 -->
  <rect x="726" y="363.6" width="38" height="111.4" fill="#2f6b9a"/>
  <rect x="776" y="452.7" width="38" height="22.3" fill="#c44e52"/>
  <text x="745" y="355" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#222222">0.20</text>
  <text x="795" y="444" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#222222">0.04</text>
  <text x="770" y="506" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#222222">Safe</text>
  <text x="770" y="526" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#222222">Skeptic</text>

  <!-- Caption -->
  <text x="490" y="570" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#333333">
    Memory reuse increases from strict to relaxed settings, but hallucination does not decrease automatically.
  </text>
  <text x="490" y="594" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#333333">
    The safe skeptic setting uses memory selectively and produces the lowest hallucination rate.
  </text>
</svg>
